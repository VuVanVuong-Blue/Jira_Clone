spring.application.name=jira-clone-backend
server.port=8080

# Tự động load file .env ở thư mục gốc project (Spring Boot 2.4+ built-in)
spring.config.import=optional:file:.env[.properties]

# ═══════════════════════════════════════════════
# DATABASE (MySQL)
# ═══════════════════════════════════════════════
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ═══════════════════════════════════════════════
# JWT & AUTHENTICATION
# ═══════════════════════════════════════════════
jira.app.jwtSecret=${JWT_SECRET}
# Access Token: 15 phut (900000 ms)
jira.app.jwtExpirationMs=900000
# Refresh Token: 30 ngay
jira.app.refreshTokenExpirationDays=30

# ═══════════════════════════════════════════════
# GOOGLE OAUTH2
# ═══════════════════════════════════════════════
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}

# ═══════════════════════════════════════════════
# BREVO SMTP (Sendinblue) - Gui OTP qua email
# ═══════════════════════════════════════════════
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}

# OTP cau hinh
otp.expiration.minutes=5
# File & Request limits for base64 images
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-swallow-size=5MB
server.tomcat.max-http-form-post-size=5MB